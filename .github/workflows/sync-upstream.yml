name: Sync Fork with Upstream

on:
  schedule:
    - cron: '0 0 * * *'       # daily at midnight UTC
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout fork
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.SYNC_PAT }}

      - name: Set Git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Add upstream & fetch
        run: |
          git remote add upstream https://github.com/bomboclatwarrior/CISC3003-GROUP03-Project.git
          git fetch upstream

      - name: Checkout default branch (replace 'main' if yours is 'master')
        run: git checkout main

      - name: Merge upstream changes
        run: |
          git merge upstream/main --no-edit
        continue-on-error: false   # stop if merge conflicts occur

      - name: Push to fork
        run: git push origin main
