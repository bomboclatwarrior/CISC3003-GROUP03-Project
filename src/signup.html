<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - Finomic</title>
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/auth.css">
    <script type="module">
    import './js/pages/auth-guard.js';
    import './js/pages/signup.js';
</script>

</head>
<body>
    <div class="auth-container">
        <div class="auth-wrapper">
            <div class="auth-logo">
                <div class="logo-icon">$</div>
                <h1>Finomic</h1>
                <p>Financial Assistant</p>
            </div>

            <div class="auth-card">
                <h2>Create account</h2>
                <p class="auth-subtitle">Get started with Finomic</p>
                <div id="signup-error" class="auth-error" style="display:none;"></div>
                <form id="signup-form">
                    <div class="form-group">
                        <label>Full Name</label>
                        <input type="text" id="signup-name" placeholder="John Doe" required>
                    </div>
                    <div class="form-group">
                        <label>Email</label>
                        <input type="email" id="signup-email" placeholder="you@example.com" required>
                    </div>
                    <div class="form-group">
                        <label>Password</label>
                        <input type="password" id="signup-password" placeholder="••••••••" required>
                    </div>
                    <div class="form-group">
                        <label>Confirm Password</label>
                        <input type="password" id="signup-confirm" placeholder="••••••••" required>
                    </div>
                    <button type="submit" class="btn-primary full-width">Create Account</button>
                    <p class="auth-footer-text">
                        Already have an account?
                        <a href="login.html">Sign in</a>
                    </p>
                </form>
            </div>

            <p class="auth-bottom-text">CISC3003 Web Programming — Group 03, 2026</p>
        </div>
    </div>

</body>
</html>
