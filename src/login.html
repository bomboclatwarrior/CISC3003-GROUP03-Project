<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Finomic</title>
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/auth.css">
    <script type="module">
        import './js/pages/auth-guard.js';
        import './js/pages/login.js';
</script>
</head>
<body>
    <div class="auth-container">
        <div class="auth-wrapper">
            <div class="auth-logo">
                <div class="logo-icon">$</div>
                <h1>Finomic</h1>
                <p>Financial Assistant</p>
            </div>

            <div class="auth-card">
                <h2>Welcome back</h2>
                <p class="auth-subtitle">Sign in to your account</p>
                <div id="login-error" class="auth-error" style="display:none;"></div>
                <form id="login-form">
                    <div class="form-group">
                        <label>Email</label>
                        <input type="email" id="login-email" placeholder="you@example.com" required>
                    </div>
                    <div class="form-group">
                        <label>Password</label>
                        <input type="password" id="login-password" placeholder="••••••••" required>
                    </div>
                    <div class="auth-link-row right">
                        <a href="forgot-password.html">Forgot password?</a>
                    </div>
                    <button type="submit" class="btn-primary full-width">Sign In</button>
                    <p class="auth-footer-text">
                        Don't have an account?
                        <a href="signup.html">Sign up</a>
                    </p>
                </form>
            </div>

            <p class="auth-bottom-text">CISC3003 Web Programming — Group 03, 2026</p>
        </div>
    </div>

</body>
</html>
