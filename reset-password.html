<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - Finomic</title>
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/auth.css">
</head>
<body>
    <div class="auth-container">
        <div class="auth-wrapper">
            <div class="auth-logo">
                <div class="logo-icon">$</div>
                <h1>Finomic</h1>
                <p>Financial Assistant</p>
            </div>

            <div class="auth-card">
                <h2>Reset password</h2>
                <p class="auth-subtitle">Enter your new password</p>
                <div id="reset-error" class="auth-error" style="display:none;"></div>
                <div id="reset-success" style="display:none;" class="auth-success">✓ Password reset successfully! Redirecting to login...</div>
                <form id="reset-form">
                    <div class="form-group">
                        <label>New Password</label>
                        <input type="password" id="reset-password" placeholder="••••••••" required>
                    </div>
                    <div class="form-group">
                        <label>Confirm New Password</label>
                        <input type="password" id="reset-confirm" placeholder="••••••••" required>
                    </div>
                    <button type="submit" class="btn-primary full-width">Reset Password</button>
                </form>
                <p class="auth-footer-text">
                    <a href="login.html">← Back to sign in</a>
                </p>
            </div>

            <p class="auth-bottom-text">CISC3003 Web Programming — Group 03, 2024</p>
        </div>
    </div>

    <script src="js/auth.js"></script>
</body>
</html>
