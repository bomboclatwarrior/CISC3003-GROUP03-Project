<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verify Email - Finomic</title>
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/auth.css">
</head>
<body>
    <div class="auth-container">
        <div class="auth-wrapper">
            <div class="auth-logo">
                <div class="logo-icon">$</div>
                <h1>Finomic</h1>
                <p>Financial Assistant</p>
            </div>

            <div class="auth-card">
                <div class="auth-center">
                    <div class="auth-icon-circle">✉️</div>
                    <h2>Verify your email</h2>
                    <p class="auth-subtitle">We sent a 6-digit code to <strong id="verify-email-display"></strong></p>
                </div>
                <div id="verify-success" style="display:none;" class="auth-success">✓ Email verified! Redirecting...</div>
                <form id="verify-form">
                    <div class="otp-group">
                        <input type="text" class="otp-input" maxlength="1" data-otp="0">
                        <input type="text" class="otp-input" maxlength="1" data-otp="1">
                        <input type="text" class="otp-input" maxlength="1" data-otp="2">
                        <input type="text" class="otp-input" maxlength="1" data-otp="3">
                        <input type="text" class="otp-input" maxlength="1" data-otp="4">
                        <input type="text" class="otp-input" maxlength="1" data-otp="5">
                    </div>
                    <button type="submit" class="btn-primary full-width">Verify Email</button>
                    <p class="auth-footer-text">
                        Didn't receive the code?
                        <a href="#" onclick="return false;">Resend</a>
                    </p>
                </form>
            </div>

            <p class="auth-bottom-text">CISC3003 Web Programming — Group 03, 2024</p>
        </div>
    </div>

    <script src="js/auth.js"></script>
</body>
</html>
