<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - Finomic</title>
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/auth.css">
</head>
<body>
    <div class="auth-container">
        <div class="auth-wrapper">
            <div class="auth-logo">
                <div class="logo-icon">$</div>
                <h1>Finomic</h1>
                <p>Financial Assistant</p>
            </div>

            <div class="auth-card">
                <div class="auth-center">
                    <h2>Forgot password?</h2>
                    <p class="auth-subtitle" id="forgot-subtitle">Enter your email to receive a reset link</p>
                </div>
                <div id="forgot-success" style="display:none;">
                    <div class="auth-center">
                        <div class="auth-icon-circle">📧</div>
                        <p class="auth-success-text">Reset link sent to <strong id="forgot-email-display"></strong></p>
                    </div>
                    <a href="reset-password.html" class="btn-primary full-width">Enter Reset Code</a>
                </div>
                <form id="forgot-form">
                    <div class="form-group">
                        <label>Email</label>
                        <input type="email" id="forgot-email" placeholder="you@example.com" required>
                    </div>
                    <button type="submit" class="btn-primary full-width">Send Reset Link</button>
                </form>
                <p class="auth-footer-text">
                    <a href="login.html">← Back to sign in</a>
                </p>
            </div>

            <p class="auth-bottom-text">CISC3003 Web Programming — Group 03, 2024</p>
        </div>
    </div>

    <script src="js/auth.js"></script>
</body>
</html>
